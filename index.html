<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P32">
<meta name="theme-color" content="#0e0e0e">
<title>P32</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #0e0e0e; color: #f0f0f0;
  font-family: -apple-system, sans-serif; overflow: hidden;
}
body { display: flex; flex-direction: column; }

#topbar {
  padding: calc(env(safe-area-inset-top) + 14px) 20px 14px;
  background: #0e0e0e; border-bottom: 1px solid #2a2a2a;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.brand { font-size: 13px; letter-spacing: 0.18em; color: #e8ff47; font-weight: 700; }
.saved { font-size: 11px; color: #555; transition: color 0.3s; }
.saved.ok { color: #4ade80; }

#tabs { display: flex; background: #0e0e0e; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
.tab {
  flex: 1; padding: 13px 8px; font-size: 13px; font-weight: 500;
  background: none; border: none; color: #555; cursor: pointer;
  border-bottom: 2px solid transparent; font-family: -apple-system, sans-serif;
  touch-action: manipulation;
}
.tab.active { color: #f0f0f0; border-bottom-color: #e8ff47; }

#content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 14px 14px calc(env(safe-area-inset-bottom) + 20px);
  -webkit-overflow-scrolling: touch;
}

.card { background: #171717; border: 1px solid #2a2a2a; border-radius: 14px; padding: 18px; margin-bottom: 10px; }
.card-label { font-size: 10px; letter-spacing: 0.12em; color: #555; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }

.pass-header { background: #141414; border: 1px solid #2a2a2a; border-radius: 14px; padding: 20px; margin-bottom: 10px; }
.pass-label { font-size: 10px; letter-spacing: 0.12em; color: #e8ff47; margin-bottom: 8px; font-weight: 700; }
.pass-name { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
.prog-bar { background: #333; border-radius: 99px; height: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: #e8ff47; border-radius: 99px; transition: width 0.3s; }
.prog-text { font-size: 11px; color: #555; margin-top: 6px; }

.ex-list { background: #171717; border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
.ex-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #222; }
.ex-row:last-child { border-bottom: none; }

.cb {
  width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid #444; background: transparent;
  cursor: pointer; touch-action: manipulation; padding: 0;
  transition: all 0.15s;
}
.cb.on { background: #e8ff47; border-color: #e8ff47; }

.ex-name { font-size: 14px; font-weight: 500; flex: 1; }
.ex-name.done { color: #555; text-decoration: line-through; }
.ex-meta { font-size: 11px; color: #555; margin-top: 2px; }

.w-input {
  width: 62px; background: #1f1f1f; border: 1px solid #333;
  border-radius: 8px; padding: 7px 6px; font-size: 13px;
  color: #f0f0f0; text-align: center;
}
.w-input:focus { outline: none; border-color: #e8ff47; }
.w-unit { font-size: 11px; color: #555; }

.btn-main {
  width: 100%; background: #e8ff47; color: #000; border: none;
  border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: -apple-system, sans-serif; touch-action: manipulation;
}
.btn-main.green { background: #4ade80; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat { background: #171717; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 12px; }
.stat-label { font-size: 9px; letter-spacing: 0.1em; color: #555; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.stat-val { font-size: 28px; font-weight: 700; letter-spacing: -1px; }

.log-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #222; }
.log-row:last-child { border-bottom: none; }
.dots { display: flex; gap: 4px; font-size: 13px; }

.countdown { font-size: 52px; font-weight: 700; letter-spacing: -3px; color: #e8ff47; line-height: 1; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  background: #1a1a1a; border-radius: 18px 18px 0 0;
  padding: 24px 20px calc(env(safe-area-inset-bottom) + 30px);
  width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto;
  transform: translateY(20px); transition: transform 0.25s;
  border-top: 1px solid #2a2a2a;
}
.overlay.open .sheet { transform: translateY(0); }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sheet-sub { font-size: 12px; color: #555; margin-bottom: 20px; }

.toggle-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid #222;
  cursor: pointer; touch-action: manipulation;
}
.toggle-row:last-of-type { border-bottom: none; }

.field {
  width: 100%; background: #222; border: 1px solid #333;
  border-radius: 10px; padding: 12px; font-size: 13px;
  color: #f0f0f0; font-family: -apple-system, sans-serif; margin-top: 12px;
}
.field:focus { outline: none; border-color: #e8ff47; }

.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn-cancel {
  flex: 1; background: #222; color: #f0f0f0; border: 1px solid #333;
  border-radius: 10px; padding: 14px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: -apple-system, sans-serif; touch-action: manipulation;
}
.btn-confirm {
  flex: 2; background: #e8ff47; color: #000; border: none;
  border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: -apple-system, sans-serif; touch-action: manipulation;
}

.bar-chart { display: flex; gap: 3px; align-items: flex-end; height: 36px; margin-top: 14px; }
.bar { flex: 1; border-radius: 3px; background: #333; min-height: 4px; }
.bar.latest { background: #e8ff47; }
.empty { text-align: center; padding: 40px 0; color: #555; font-size: 13px; }

.check-svg { display: block; }
</style>
</head>
<body>

<div id="topbar">
  <span class="brand">P32</span>
  <span class="saved" id="si">auto-sparar</span>
</div>

<div id="tabs">
  <button class="tab active" id="t-today" onclick="go('today')">Idag</button>
  <button class="tab" id="t-overview" onclick="go('overview')">Översikt</button>
  <button class="tab" id="t-logg" onclick="go('logg')">Logg</button>
  <button class="tab" id="t-vikter" onclick="go('vikter')">Vikter</button>
</div>

<div id="content"></div>

<div class="overlay" id="log-overlay" onclick="closeOverlay('log-overlay')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Logga pass</div>
    <div class="sheet-sub" id="log-sub"></div>
    <div id="log-toggles"></div>
    <input class="field" type="text" id="log-note" placeholder="Notering (valfri)">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeOverlay('log-overlay')">Avbryt</button>
      <button class="btn-confirm" onclick="savePass()">Spara &amp; nästa pass</button>
    </div>
  </div>
</div>

<div class="overlay" id="w-overlay" onclick="closeOverlay('w-overlay')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Logga vikt</div>
    <select class="field" id="w-ex"></select>
    <input class="field" type="number" step="0.5" min="0" id="w-kg" placeholder="Vikt i kg">
    <input class="field" type="date" id="w-date">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeOverlay('w-overlay')">Avbryt</button>
      <button class="btn-confirm" onclick="saveWeight()">Spara</button>
    </div>
  </div>
</div>

<script>
var LS = "p32_v5";
var TARGET = new Date("2026-12-10");
var START  = new Date("2026-03-10");

var PASSES = [
  { id:"push", label:"Gym A \u2014 \u00d6vre (Push)", gym:true, exercises:[
    { name:"Incline DB Press",        dw:27.5, sets:2, reps:"8\u201310" },
    { name:"Seated DB Lateral Raise", dw:8,    sets:2, reps:"12\u201315" },
    { name:"Flat DB Fly",             dw:15,   sets:2, reps:"10\u201312" },
    { name:"Lying Skullcrusher",      dw:25,   sets:2, reps:"10\u201312" },
    { name:"Cable Pushdown",          dw:20,   sets:2, reps:"12\u201315" },
    { name:"Face Pull",               dw:15,   sets:2, reps:"15\u201320" }
  ]},
  { id:"hiit", label:"Hempass \u2014 KB HIIT + Intervaller", gym:false, exercises:[
    { name:"KB Swing",      sets:"6\u20138 rdr", reps:"10" },
    { name:"KB Clean",      sets:"",             reps:"5/sida" },
    { name:"KB Push Press", sets:"",             reps:"5/sida" },
    { name:"Goblet Squat",  sets:"",             reps:"8" },
    { name:"KB Row",        sets:"",             reps:"8/sida" },
    { name:"Löpintervaller 5x(1 min snabbt / 1 min lugnt)", sets:"", reps:"" }
  ]},
  { id:"lower", label:"Gym B \u2014 Underkropp", gym:true, exercises:[
    { name:"High Bar Squat",      dw:null, sets:2, reps:"6\u20138" },
    { name:"Romanian Deadlift",   dw:null, sets:2, reps:"8\u201310" },
    { name:"Walking Lunges",      dw:null, sets:2, reps:"10/ben" },
    { name:"Seated Leg Curl",     dw:null, sets:2, reps:"10\u201312" },
    { name:"Standing Calf Raise", dw:null, sets:2, reps:"15\u201320" }
  ]},
  { id:"flow", label:"Hempass \u2014 KB Flow + Distans", gym:false, exercises:[
    { name:"KB Clean",      sets:"3 rdr", reps:"5/sida" },
    { name:"Front Squat",   sets:"",      reps:"5/sida" },
    { name:"Strict Press",  sets:"",      reps:"5/sida" },
    { name:"Reverse Lunge", sets:"",      reps:"5/sida" },
    { name:"KB Deadlift",   sets:"",      reps:"8" },
    { name:"Halo",          sets:"",      reps:"5/håll" },
    { name:"Distanslöpning 40-60 min Zon 2", sets:"", reps:"" }
  ]},
  { id:"pull", label:"Gym A \u2014 \u00d6vre (Pull)", gym:true, exercises:[
    { name:"Barbell Row",     dw:null, sets:2, reps:"8\u201310" },
    { name:"One-arm DB Row",  dw:32,   sets:2, reps:"8\u201310" },
    { name:"Lat Pulldown",    dw:null, sets:2, reps:"10\u201312" },
    { name:"Z-Bar Curl",      dw:32.5, sets:2, reps:"8\u201310" },
    { name:"DB Hammer Curl",  dw:null, sets:2, reps:"10\u201312" },
    { name:"Face Pull",       dw:null, sets:2, reps:"15\u201320" }
  ]},
  { id:"mob", label:"Mobilitet / Prehab", gym:false, exercises:[
    { name:"Hip Flexor KB Raises",  sets:2, reps:"15" },
    { name:"Seated Tibialis Raise", sets:2, reps:"20" },
    { name:"90/90 Hip Rotations",   sets:2, reps:"10/sida" },
    { name:"Hip Flexor Stretch",    sets:2, reps:"45 sek" },
    { name:"Glute Bridge Hold",     sets:2, reps:"30 sek" }
  ]}
];

var ALL_EX = [];
for (var pi = 0; pi < PASSES.length; pi++) {
  for (var ei = 0; ei < PASSES[pi].exercises.length; ei++) {
    var en = PASSES[pi].exercises[ei].name;
    if (ALL_EX.indexOf(en) === -1) ALL_EX.push(en);
  }
}

function loadD() {
  try { var r = localStorage.getItem(LS); if (r) return JSON.parse(r); } catch(e) {}
  return { logs:[], weights:{}, idx:0, cl:{} };
}
function saveD() {
  try { localStorage.setItem(LS, JSON.stringify(D)); } catch(e) {}
  var el = document.getElementById("si");
  el.textContent = "sparat";
  el.className = "saved ok";
  setTimeout(function() { el.textContent = "auto-sparar"; el.className = "saved"; }, 1500);
}

var D = loadD();
var curTab = "today";
var logState = { shake:false, content:false, onyttigheter:false };

function curPass() { return PASSES[D.idx % PASSES.length]; }

function ckKey() {
  var d = new Date();
  var ds = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
  return "c" + D.idx + "_" + ds;
}

function getCh() {
  var k = ckKey();
  return D.cl[k] || {};
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
}

function pad(n) { return n < 10 ? "0" + n : "" + n; }

function daysLeft() {
  var now = new Date(); now.setHours(0,0,0,0);
  var t = new Date(TARGET.getTime()); t.setHours(0,0,0,0);
  return Math.max(0, Math.round((t.getTime() - now.getTime()) / 86400000));
}

function progress() {
  var now = new Date(); now.setHours(0,0,0,0);
  var total = Math.round((TARGET.getTime() - START.getTime()) / 86400000);
  var done = Math.round((now.getTime() - START.getTime()) / 86400000);
  return Math.min(100, Math.max(0, Math.round(done / total * 100)));
}

function streak() {
  if (!D.logs.length) return 0;
  var dates = [];
  for (var i = 0; i < D.logs.length; i++) {
    if (dates.indexOf(D.logs[i].date) === -1) dates.push(D.logs[i].date);
  }
  dates.sort(function(a, b) { return a < b ? 1 : -1; });
  var s = 0;
  var check = new Date(); check.setHours(0,0,0,0);
  for (var i = 0; i < dates.length; i++) {
    var dt = new Date(dates[i]); dt.setHours(0,0,0,0);
    var diff = Math.round((check.getTime() - dt.getTime()) / 86400000);
    if (diff === 0 || diff === 1) { s++; check = dt; } else break;
  }
  return s;
}

function toggleEx(idx) {
  var pass = curPass();
  var name = pass.exercises[idx].name;
  var k = ckKey();
  var c = D.cl[k] ? JSON.parse(JSON.stringify(D.cl[k])) : {};
  c[name] = !c[name];
  D.cl[k] = c;
  saveD();
  render();
}

function setW(idx, val) {
  var pass = curPass();
  var name = pass.exercises[idx].name;
  var k = ckKey();
  var c = D.cl[k] ? JSON.parse(JSON.stringify(D.cl[k])) : {};
  c["w_" + name] = val;
  D.cl[k] = c;
  saveD();
}

function go(tab) {
  curTab = tab;
  var tabs = ["today","overview","logg","vikter"];
  for (var i = 0; i < tabs.length; i++) {
    var el = document.getElementById("t-" + tabs[i]);
    if (el) el.className = tab === tabs[i] ? "tab active" : "tab";
  }
  render();
}

function render() {
  var el = document.getElementById("content");
  if (curTab === "today") el.innerHTML = renderToday();
  else if (curTab === "overview") el.innerHTML = renderOverview();
  else if (curTab === "logg") el.innerHTML = renderLogg();
  else el.innerHTML = renderVikter();
}

var CHECK_SVG = '<svg class="check-svg" width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function renderToday() {
  var pass = curPass();
  var ch = getCh();
  var exes = pass.exercises;
  var done = 0;
  for (var i = 0; i < exes.length; i++) { if (ch[exes[i].name]) done++; }
  var total = exes.length;
  var pct = total ? Math.round(done / total * 100) : 0;

  var h = "";
  h += '<div class="pass-header">';
  h += '<div class="pass-label">NÄSTA PASS</div>';
  h += '<div class="pass-name">' + pass.label + '</div>';
  h += '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>';
  h += '<div class="prog-text">' + done + " / " + total + " klara</div>";
  h += '</div>';

  h += '<div class="ex-list">';
  for (var i = 0; i < exes.length; i++) {
    var ex = exes[i];
    var isDone = !!ch[ex.name];
    var wVal = ch["w_" + ex.name] || "";
    var lw = D.weights[ex.name];
    var ph = (lw && lw.length) ? lw[lw.length - 1].weight : (ex.dw || "");
    var metaParts = [];
    if (ex.sets !== "" && ex.sets !== undefined) {
      metaParts.push(typeof ex.sets === "number" ? ex.sets + " set" : ex.sets);
    }
    if (ex.reps && ex.reps !== "") metaParts.push(ex.reps);
    var meta = metaParts.join(" · ");

    h += '<div class="ex-row">';
    h += '<button class="cb' + (isDone ? " on" : "") + '" onclick="toggleEx(' + i + ')">';
    if (isDone) h += CHECK_SVG;
    h += '</button>';
    h += '<div style="flex:1">';
    h += '<div class="ex-name' + (isDone ? " done" : "") + '">' + ex.name + '</div>';
    if (meta) h += '<div class="ex-meta">' + meta + '</div>';
    h += '</div>';
    if (pass.gym) {
      h += '<input class="w-input" type="number" step="0.5" placeholder="' + ph + '" value="' + wVal + '" oninput="setW(' + i + ', this.value)">';
      h += '<span class="w-unit">kg</span>';
    }
    h += '</div>';
  }
  h += '</div>';

  var isAllDone = done === total;
  h += '<button class="btn-main' + (isAllDone ? " green" : "") + '" onclick="openLog()">';
  h += isAllDone ? "Logga pass" : "Logga pass";
  h += '</button>';
  return h;
}

function renderOverview() {
  var dl = daysLeft();
  var pct = progress();
  var s = streak();
  var missed = 0;
  for (var i = 0; i < D.logs.length; i++) { if (!D.logs[i].content) missed++; }

  var h = "";
  h += '<div class="card">';
  h += '<div class="card-label">Räknar ner till 10 dec</div>';
  h += '<div class="countdown">' + dl + '</div>';
  h += '<div style="font-size:14px;color:#555;margin:4px 0 14px">dagar kvar</div>';
  h += '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>';
  h += '<div class="prog-text" style="margin-top:8px">' + pct + '% · mål 85 kg</div>';
  h += '</div>';

  h += '<div class="stats-grid">';
  h += '<div class="stat"><div class="stat-label">Pass</div><div class="stat-val">' + D.logs.length + '</div></div>';
  h += '<div class="stat"><div class="stat-label">Streak</div><div class="stat-val">' + s + '<span style="font-size:14px;color:#555">d</span></div></div>';
  h += '<div class="stat"><div class="stat-label">Content X</div><div class="stat-val" style="color:#f87171">' + missed + '</div></div>';
  h += '</div>';

  h += '<div class="card"><div class="card-label">Senaste pass</div>';
  if (!D.logs.length) {
    h += '<div class="empty">Inga pass ännu</div>';
  } else {
    var n = Math.min(5, D.logs.length);
    for (var i = 0; i < n; i++) {
      var l = D.logs[i];
      h += '<div class="log-row">';
      h += '<div><div style="font-size:13px;font-weight:500">' + l.type + '</div>';
      h += '<div style="font-size:11px;color:#555;margin-top:3px">' + l.date + '</div></div>';
      h += '<div class="dots"><span>' + (l.shake ? "🟩" : "🟥") + '</span>';
      h += '<span>' + (l.content ? "🟩" : "🟥") + '</span>';
      h += '<span>' + (!l.onyttigheter ? "🟩" : "🟥") + '</span></div>';
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

function renderLogg() {
  if (!D.logs.length) return '<div class="empty">Inga pass loggade</div>';
  var h = "";
  for (var i = 0; i < D.logs.length; i++) {
    var l = D.logs[i];
    h += '<div class="card" style="margin-bottom:8px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    h += '<div><div style="font-weight:600;font-size:14px">' + l.type + '</div>';
    h += '<div style="font-size:11px;color:#555;margin-top:3px">' + l.date + '</div></div>';
    h += '<div class="dots"><span>' + (l.shake ? "🟩" : "🟥") + '</span>';
    h += '<span>' + (l.content ? "🟩" : "🟥") + '</span>';
    h += '<span>' + (!l.onyttigheter ? "🟩" : "🟥") + '</span></div></div>';
    if (l.note) h += '<div style="font-size:12px;color:#555;margin-top:10px;font-style:italic">' + l.note + '</div>';
    h += '</div>';
  }
  return h;
}

function renderVikter() {
  var h = '<button class="btn-main" onclick="openWeight()" style="margin-bottom:12px">+ Logga vikt</button>';
  var keys = Object.keys(D.weights);
  if (!keys.length) return h + '<div class="empty">Inga vikter loggade</div>';
  for (var i = 0; i < keys.length; i++) {
    var ex = keys[i];
    var data = D.weights[ex];
    var latest = data[data.length - 1];
    var prev = data.length > 1 ? data[data.length - 2] : null;
    var diff = prev ? Math.round((latest.weight - prev.weight) * 10) / 10 : null;
    var maxW = 0, minW = 99999;
    for (var j = 0; j < data.length; j++) {
      if (data[j].weight > maxW) maxW = data[j].weight;
      if (data[j].weight < minW) minW = data[j].weight;
    }
    var range = maxW - minW || 1;
    h += '<div class="card" style="margin-bottom:8px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    h += '<div><div style="font-weight:600;font-size:14px">' + ex + '</div>';
    h += '<div style="font-size:11px;color:#555;margin-top:3px">' + data.length + ' loggningar</div></div>';
    h += '<div style="text-align:right">';
    h += '<div style="font-size:22px;font-weight:700">' + latest.weight + '<span style="font-size:12px;color:#555;margin-left:3px">kg</span></div>';
    if (diff !== null) {
      var dc = diff > 0 ? "#4ade80" : diff < 0 ? "#f87171" : "#555";
      h += '<div style="font-size:11px;color:' + dc + '">' + (diff > 0 ? "+" : "") + diff + " kg</div>";
    }
    h += '</div></div>';
    if (data.length > 1) {
      h += '<div class="bar-chart">';
      for (var j = 0; j < data.length; j++) {
        var bh = 6 + ((data[j].weight - minW) / range) * 30;
        h += '<div class="bar' + (j === data.length - 1 ? " latest" : "") + '" style="height:' + bh + 'px"></div>';
      }
      h += '</div>';
    }
    h += '</div>';
  }
  return h;
}

function openLog() {
  logState = { shake:false, content:false, onyttigheter:false };
  document.getElementById("log-sub").textContent = curPass().label;
  document.getElementById("log-note").value = "";
  renderLogToggles();
  document.getElementById("log-overlay").className = "overlay open";
}

function renderLogToggles() {
  var items = [
    ["shake", "Shake tagen"],
    ["content", "Content fångad"],
    ["onyttigheter", "Onyttigheter"]
  ];
  var h = "";
  for (var i = 0; i < items.length; i++) {
    var k = items[i][0];
    var label = items[i][1];
    var on = logState[k];
    h += '<div class="toggle-row" onclick="toggleLog(\'' + k + '\')">';
    h += '<button class="cb' + (on ? " on" : "") + '" style="pointer-events:none">';
    if (on) h += CHECK_SVG;
    h += '</button>';
    h += '<span style="font-size:14px">' + label + '</span></div>';
  }
  document.getElementById("log-toggles").innerHTML = h;
}

function toggleLog(k) {
  logState[k] = !logState[k];
  renderLogToggles();
}

function savePass() {
  var pass = curPass();
  var ch = getCh();
  var nw = JSON.parse(JSON.stringify(D.weights));
  for (var i = 0; i < pass.exercises.length; i++) {
    var ex = pass.exercises[i];
    var v = parseFloat(ch["w_" + ex.name]);
    if (v) {
      var dt = todayStr();
      var prev = nw[ex.name] || [];
      var filtered = [];
      for (var j = 0; j < prev.length; j++) { if (prev[j].date !== dt) filtered.push(prev[j]); }
      filtered.push({ weight:v, date:dt });
      filtered.sort(function(a, b) { return a.date > b.date ? 1 : -1; });
      nw[ex.name] = filtered;
    }
  }
  var entry = {
    id: Date.now(), type: pass.label, date: todayStr(),
    shake: logState.shake, content: logState.content,
    onyttigheter: logState.onyttigheter,
    note: document.getElementById("log-note").value
  };
  var k = ckKey();
  var newCl = JSON.parse(JSON.stringify(D.cl));
  delete newCl[k];
  D.logs = [entry].concat(D.logs);
  D.idx = (D.idx + 1) % PASSES.length;
  D.cl = newCl;
  D.weights = nw;
  saveD();
  closeOverlay("log-overlay");
  render();
}

function openWeight() {
  var sel = document.getElementById("w-ex");
  var h = "";
  for (var i = 0; i < ALL_EX.length; i++) {
    h += '<option value="' + ALL_EX[i] + '">' + ALL_EX[i] + '</option>';
  }
  sel.innerHTML = h;
  document.getElementById("w-kg").value = "";
  document.getElementById("w-date").value = todayStr();
  document.getElementById("w-overlay").className = "overlay open";
}

function saveWeight() {
  var ex = document.getElementById("w-ex").value;
  var kg = parseFloat(document.getElementById("w-kg").value);
  var dt = document.getElementById("w-date").value;
  if (!kg || !ex) return;
  var prev = D.weights[ex] || [];
  var filtered = [];
  for (var i = 0; i < prev.length; i++) { if (prev[i].date !== dt) filtered.push(prev[i]); }
  filtered.push({ weight:kg, date:dt });
  filtered.sort(function(a, b) { return a.date > b.date ? 1 : -1; });
  D.weights[ex] = filtered;
  saveD();
  closeOverlay("w-overlay");
  render();
}

function closeOverlay(id) {
  document.getElementById(id).className = "overlay";
}

render();
</script>
</body>
</html>
